---
name: Sonas
options:
  bundleIdPrefix: com.anindependentmind
  deploymentTarget:
    iOS: '17.0'
    watchOS: '11.0'
    tvOS: '18.0'
  xcodeVersion: '16'
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: '5.10'
    MARKETING_VERSION: '1.0.0'
    CURRENT_PROJECT_VERSION: '1'
    DEVELOPMENT_TEAM: '' # Set your Apple Developer Team ID here
# packages: (none linked yet)
# GoogleSignIn: AppAuth inside it initialises ASWebAuthenticationSession via ViewBridge at launch
#   even when never imported → "ViewBridge to RemoteViewService Terminated" noise on every run.
#   Re-add when import GoogleSignIn appears in CalendarService.swift.
#   GoogleSignIn:
#     url: https://github.com/google/GoogleSignIn-iOS
#     exactVersion: "7.1.0"
# SpotifyiOS: static initializers run at launch even when never imported → fopen errors and
#   UIColor out-of-range warnings. Re-add when import SpotifyiOS appears in SpotifyJamService.swift.
#   SpotifyiOS:
#     url: https://github.com/spotify/ios-sdk
#     exactVersion: "1.2.3"
targets:
  # ─── Main iOS App ────────────────────────────────────────────────────────────
  Sonas:
    type: application
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - path: Sonas
        excludes:
          - '**/*.md'
    info:
      path: Sonas/Info.plist
      properties:
        CFBundleDisplayName: Sonas
        CFBundleShortVersionString: '$(MARKETING_VERSION)'
        CFBundleVersion: '$(CURRENT_PROJECT_VERSION)'
        # Location permissions
        NSLocationWhenInUseUsageDescription: 'Sonas shares your location with family members via CloudKit.'
        NSLocationAlwaysAndWhenInUseUsageDescription:
          'Sonas updates your location in the background so family members always see where you are.'
        # Photo permissions
        NSPhotoLibraryUsageDescription: 'Sonas reads your iCloud Shared Album to display family photos.'
        # Spotify
        SPTClientID: ''
        SPTRedirectURL: 'sonas://spotify-callback'
        # URL Schemes
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - sonas
          - CFBundleURLSchemes:
              - 'com.googleusercontent.apps.YOUR_GOOGLE_CLIENT_ID'
        # Background modes
        UIBackgroundModes:
          - fetch
          - remote-notification
        # Orientation support (iPad requires all 4; iPhone excludes upside-down)
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Plist-based launch screen (iOS 14+; no storyboard file required)
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anindependentmind.sonas
        ENABLE_HARDENED_RUNTIME: YES
    entitlements:
      path: Sonas/Sonas.entitlements
    capabilities:
      - BackgroundModes
    # WeatherKit and CloudKit/iCloud capabilities require a paid Apple Developer account.
    # Re-enable once a paid account is available:
    #   entitlements properties: com.apple.developer.weatherkit, com.apple.developer.icloud-services,
    #       com.apple.developer.icloud-container-identifiers
    #   capabilities: WeatherKit, CloudKit
    # dependencies: (none — GoogleSignIn and SpotifyiOS unlinked until actually imported; see packages comment above)
    scheme:
      environmentVariables:
        USE_MOCK_LOCATION: '0'
        USE_MOCK_WEATHER: '0'
        USE_MOCK_CALENDAR: '0'
        USE_MOCK_TASKS: '0'
        USE_MOCK_PHOTOS: '0'
        USE_MOCK_JAM: '0'
  # ─── Unit + Contract Tests ────────────────────────────────────────────────────
  SonasTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - path: SonasTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anindependentmind.sonas.tests
    dependencies:
      - target: Sonas
  # ─── UI Tests ─────────────────────────────────────────────────────────────────
  SonasUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - path: SonasUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anindependentmind.sonas.uitests
    dependencies:
      - target: Sonas
  # ─── watchOS Extension ────────────────────────────────────────────────────────
  WatchSonas:
    type: application
    platform: watchOS
    deploymentTarget: '11.0'
    sources:
      - path: Sonas/Platform/Watch
      - path: Sonas/Shared
        excludes:
          - 'Mocks/**'
          - '**/*.md'
      - path: WatchSonas/Assets.xcassets
    info:
      path: WatchSonas/Info.plist
      properties:
        CFBundleDisplayName: Sonas
        CFBundleShortVersionString: '$(MARKETING_VERSION)'
        CFBundleVersion: '$(CURRENT_PROJECT_VERSION)'
        WKApplication: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anindependentmind.sonas.watch
  # ─── tvOS App ─────────────────────────────────────────────────────────────────
  TVSonas:
    type: application
    platform: tvOS
    deploymentTarget: '18.0'
    sources:
      - path: Sonas/Platform/TV
      - path: Sonas/Shared
        excludes:
          - 'Mocks/**'
          - '**/*.md'
      - path: TVSonas/Assets.xcassets
    info:
      path: TVSonas/Info.plist
      properties:
        CFBundleDisplayName: Sonas
        CFBundleShortVersionString: '$(MARKETING_VERSION)'
        CFBundleVersion: '$(CURRENT_PROJECT_VERSION)'
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anindependentmind.sonas.tv
schemes:
  Sonas:
    build:
      targets:
        Sonas: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      coverageTargets:
        - Sonas
      targets:
        - name: SonasTests
          parallelizable: true
          randomExecutionOrder: true
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  SonasTests:
    build:
      targets:
        SonasTests: all
    test:
      config: Debug
      gatherCoverageData: true
      coverageTargets:
        - Sonas
      targets:
        - name: SonasTests
          parallelizable: true
          randomExecutionOrder: true
  SonasUITests:
    build:
      targets:
        SonasUITests: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: SonasUITests
          parallelizable: false
