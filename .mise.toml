# Don't put credentials or other secrets into this shared file!
[hooks]
enter = "mise i -q"

[settings]
env_file = ".env"
experimental = true
gpg_verify = true
status.missing_tools = "always"
status.show_env = true

[tasks.ci-clean]
description = 'Wipe local DerivedData so the next ci-* run starts fresh like CI'
run = 'rm -rf .build/DerivedData'

[tasks.ci-prek]
depends = ["ci-clean"]
description = 'Run GitHub Actions prek linting locally using act'
run = 'act --job prek --platform macos-15=-self-hosted'

[tasks.ci-ui-ios]
depends = ["ci-clean"]
description = 'Run GitHub Actions ui-ios tests locally using act'
run = 'act --job ui-ios --platform macos-15=-self-hosted'

[tasks.ci-ui-mac]
depends = ["ci-clean"]
description = 'Run GitHub Actions ui-mac tests locally using act'
run = 'act --job ui-mac --platform macos-15=-self-hosted'

[tasks.ci-unit-contract-ios]
depends = ["ci-clean"]
description = 'Run GitHub Actions unit-contract-ios tests locally using act'
run = 'act --job unit-contract-ios --platform macos-15=-self-hosted'

[tasks.ci-unit-contract-mac]
depends = ["ci-clean"]
description = 'Run GitHub Actions unit-contract-mac tests locally using act'
run = 'act --job unit-contract-mac --platform macos-15=-self-hosted'

[tasks.lint]
description = 'Run all linters'
run = 'prek run --all-files'

[tasks.tests-ui-ios]
description = 'Run UI tests on iOS Simulator'
run = '''
    set -euo pipefail
    SIM=$(xcrun simctl list devices available | grep -m1 'iPhone [0-9]' | sed 's/.*(\([A-Z0-9-]*\)).*/\1/')
    if [ -z "$SIM" ]; then
        echo "No iOS Simulator runtime found. Install one via Xcode > Settings > Components." >&2
        exit 1
    fi
    mkdir -p .build/DerivedData/ui-ios
    xcodebuild test \
        -scheme SonasUITests \
        -destination "platform=iOS Simulator,id=$SIM" \
        -derivedDataPath "$(pwd)/.build/DerivedData/ui-ios" \
        -enableCodeCoverage YES \
        -configuration Debug \
        CODE_SIGN_IDENTITY="" \
        CODE_SIGNING_REQUIRED=NO \
        CODE_SIGNING_ALLOWED=NO
'''

[tasks.tests-ui-mac]
description = 'Run UI tests on Mac (Native)'
run = '''
    set -euo pipefail
    mkdir -p .build/DerivedData/ui-mac
    xcodebuild test \
        -scheme MacSonas \
        -destination 'platform=macOS' \
        -derivedDataPath "$(pwd)/.build/DerivedData/ui-mac" \
        -enableCodeCoverage YES \
        -configuration Debug \
        CODE_SIGN_IDENTITY="" \
        CODE_SIGNING_REQUIRED=NO \
        CODE_SIGNING_ALLOWED=NO
'''

[tasks.tests-ui-tv]
description = 'Run UI tests on tvOS (Apple TV 4K)'
run = '''
    set -euo pipefail
    mkdir -p .build/DerivedData/ui-tv
    xcodebuild test \
        -scheme TVSonas \
        -destination 'platform=tvOS Simulator,name=Apple TV 4K (3rd generation)' \
        -derivedDataPath "$(pwd)/.build/DerivedData/ui-tv" \
        -enableCodeCoverage YES \
        -configuration Debug \
        CODE_SIGN_IDENTITY="" \
        CODE_SIGNING_REQUIRED=NO \
        CODE_SIGNING_ALLOWED=NO
'''

[tasks.tests-ui-tv]
description = 'Run UI tests on tvOS (Apple TV 4K)'
run = '''
    set -euo pipefail
    mkdir -p .build/DerivedData/ui-tv
    xcodebuild test \
        -scheme TVSonas \
        -destination 'platform=tvOS Simulator,name=Apple TV 4K (3rd generation)' \
        -derivedDataPath "$(pwd)/.build/DerivedData/ui-tv" \
        -enableCodeCoverage YES \
        -configuration Debug \
        CODE_SIGN_IDENTITY="" \
        CODE_SIGNING_REQUIRED=NO \
        CODE_SIGNING_ALLOWED=NO
'''

[tasks.tests-ui]
description = 'Run all UI tests'
depends = ["tests-ui-ios", "tests-ui-mac", "tests-ui-tv"]

[tasks.tests-unit-ios]
description = 'Run unit tests on iOS Simulator'
run = '''
    set -euo pipefail
    SIM=$(xcrun simctl list devices available | grep -m1 'iPhone [0-9]' | sed 's/.*(\([A-Z0-9-]*\)).*/\1/')
    if [ -z "$SIM" ]; then
        echo "No iOS Simulator runtime found. Install one via Xcode > Settings > Components." >&2
        exit 1
    fi
    mkdir -p .build/DerivedData/unit-ios
    xcodebuild test \
        -scheme SonasTests \
        -destination "platform=iOS Simulator,id=$SIM" \
        -derivedDataPath "$(pwd)/.build/DerivedData/unit-ios" \
        -configuration Debug \
        -enableCodeCoverage YES \
        CODE_SIGN_IDENTITY="" \
        CODE_SIGNING_REQUIRED=NO \
        CODE_SIGNING_ALLOWED=NO \
        SWIFT_TESTING_ENABLED=YES
'''

[tasks.tests-unit-mac]
description = 'Run unit tests on Mac (Native build check)'
run = '''
    set -euo pipefail
    # We build the MacSonas target to verify compilation in CI.
    # Unit tests for shared logic are covered by tests-unit-ios.
    xcodebuild build \
        -scheme MacSonas \
        -destination 'platform=macOS' \
        -derivedDataPath "$(pwd)/.build/DerivedData/unit-mac" \
        -configuration Debug \
        CODE_SIGN_IDENTITY="" \
        CODE_SIGNING_REQUIRED=NO \
        CODE_SIGNING_ALLOWED=NO
'''

[tasks.tests-unit]
description = 'Run all unit tests'
depends = ["tests-unit-*"]

[tasks.tests]
description = 'Run all tests'
depends = [
    "tests-ui",
    "tests-unit",
]

[tools]
act = "latest"
actionlint = "latest"
editorconfig-checker = "latest"
prek = "latest"
prettier = "latest"
ripsecrets = "latest"
shellcheck = "latest"
shfmt = "latest"
swiftformat = { version = "latest", no_app = "true", rename_exe = "swiftformat" }
swiftlint = "latest"
xcodegen = "latest"
yamllint = "latest"
