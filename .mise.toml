# Don't put credentials or other secrets into this shared file!
[hooks]
enter = "mise i -q"

[settings]
env_file = ".env"
experimental = true
gpg_verify = true
status.missing_tools = "always"
status.show_env = true

[tasks.lint]
description = 'Run all linters'
run = 'prek run --all-files'

[tasks.tests-ui-ios]
description = 'Run UI tests on iOS Simulator'
run = '''
    set -euo pipefail
    SIM=$(xcrun simctl list devices available | grep -m1 'iPhone [0-9]' | sed 's/.*(\([A-Z0-9-]*\)).*/\1/')
    if [ -z "$SIM" ]; then
        echo "No iOS Simulator runtime found. Install one via Xcode > Settings > Components." >&2
        exit 1
    fi
    xcodebuild test \
        -scheme SonasUITests \
        -destination "platform=iOS Simulator,id=$SIM" \
        -enableCodeCoverage YES \
        -configuration Debug \
        CODE_SIGN_IDENTITY="" \
        CODE_SIGNING_REQUIRED=NO \
        CODE_SIGNING_ALLOWED=NO
'''

[tasks.tests-ui-mac]
description = 'Run UI tests on Mac'
run = '''
    set -euo pipefail
    xcodebuild build-for-testing \
        -scheme SonasUITests \
        -destination 'platform=macOS,variant=Mac Catalyst' \
        -enableCodeCoverage YES \
        -configuration Debug \
        CODE_SIGN_IDENTITY="" \
        CODE_SIGNING_REQUIRED=NO \
        CODE_SIGNING_ALLOWED=NO

    RUNNER=$(find ~/Library/Developer/Xcode/DerivedData -name "SonasUITests-Runner.app" -type d | head -1)
    codesign --force --sign - "$RUNNER"

    xcodebuild test-without-building \
        -scheme SonasUITests \
        -destination 'platform=macOS,variant=Mac Catalyst' \
        -enableCodeCoverage YES \
        -configuration Debug \
        CODE_SIGN_IDENTITY="" \
        CODE_SIGNING_REQUIRED=NO \
        CODE_SIGNING_ALLOWED=NO
'''

[tasks.tests-ui]
depends = ["tests-ui-*"]

[tasks.tests-unit-ios]
description = 'Run unit tests on iOS Simulator'
run = '''
    set -euo pipefail
    SIM=$(xcrun simctl list devices available | grep -m1 'iPhone [0-9]' | sed 's/.*(\([A-Z0-9-]*\)).*/\1/')
    if [ -z "$SIM" ]; then
        echo "No iOS Simulator runtime found. Install one via Xcode > Settings > Components." >&2
        exit 1
    fi
    xcodebuild test \
        -scheme SonasTests \
        -destination "platform=iOS Simulator,id=$SIM" \
        -configuration Debug \
        -enableCodeCoverage YES \
        CODE_SIGN_IDENTITY="" \
        CODE_SIGNING_REQUIRED=NO \
        CODE_SIGNING_ALLOWED=NO \
        SWIFT_TESTING_ENABLED=YES
'''

[tasks.tests-unit-mac]
description = 'Run unit tests on Mac'
run = '''
    xcodebuild test \
        -scheme SonasTests \
        -destination 'platform=macOS,variant=Mac Catalyst' \
        -configuration Debug \
        -enableCodeCoverage YES \
        CODE_SIGN_IDENTITY="" \
        CODE_SIGNING_REQUIRED=NO \
        CODE_SIGNING_ALLOWED=NO \
        SWIFT_TESTING_ENABLED=YES
'''

[tasks.tests-unit]
depends = ["tests-unit-*"]

[tasks.tests]
depends = [
    "tests-ui",
    "tests-unit",
]

[tools]
actionlint = "latest"
editorconfig-checker = "latest"
lychee = "latest"
prek = "latest"
prettier = "latest"
ripsecrets = "latest"
shellcheck = "latest"
shfmt = "latest"
swiftformat = { version = "latest", no_app = "true", rename_exe = "swiftformat" }
swiftlint = "latest"
xcodegen = "latest"
yamllint = "latest"
