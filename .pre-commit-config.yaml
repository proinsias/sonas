---
default_install_hook_types:
  - commit-msg
  - prepare-commit-msg
  - pre-commit
  - pre-merge-commit
  - pre-push
  - pre-rebase
  - post-checkout
  - post-commit
  - post-merge
  - post-rewrite
repos:
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.6
    hooks:
      - id: remove-crlf
      - id: remove-tabs
        exclude: .git/COMMIT_EDITMSG
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        stages: [pre-commit]
        language: unsupported
        entry: prettier . --ignore-unknown --log-level warn --write
        'types': [text]
        require_serial: false
        pass_filenames: false
  - repo: https://github.com/sirwart/ripsecrets
    rev: v0.1.11 # Use latest tag on GitHub
    hooks:
      - id: ripsecrets
  - repo: https://github.com/sirosen/check-jsonschema
    rev: 0.37.1
    hooks:
      - id: check-github-actions
      - id: check-github-workflows
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-json
  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        args: [-i, '4']
  # ── Shell scripts (.specify/scripts/bash/ and integrations) ────────────────
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: [--severity=warning, --external-sources, --format=gcc, --shell=bash]
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        args: [-c=.yamllint.yml]
  - repo: https://github.com/editorconfig-checker/editorconfig-checker.python
    rev: 3.6.1
    hooks:
      - id: editorconfig-checker
  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1
    hooks:
      - id: gitlint
  - repo: https://github.com/lycheeverse/lychee.git
    rev: lychee-v0.23.0
    hooks:
      - id: lychee
        args: ['--cache', '--suggest']
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: mixed-line-ending
        args: [--fix=lf]
  - repo: local
    hooks:
      - id: swiftformat
        name: swiftformat
        stages: [pre-commit]
        language: unsupported
        entry: swiftformat --quiet
        'types': [text]
        require_serial: false
        files: '.*(\.swift)$'
  - repo: https://github.com/realm/SwiftLint
    rev: 0.57.1
    hooks:
      - id: swiftlint
        args: [--fix]
      - id: swiftlint
        args: [--strict]

