included:
  - Sonas
  - SonasTests
  - SonasUITests

excluded:
  - Sonas/Shared/Mocks  # Mock files are test-only; relaxed complexity limits acceptable

# Enabled rules on top of the default set
opt_in_rules:
  - array_init
  - closure_spacing
  - collection_alignment
  - contains_over_first_not_nil
  - discouraged_optional_boolean
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - first_where
  - force_unwrapping
  - identical_operands
  - joined_default_parameter
  - literal_expression_end_indentation
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - trailing_closure
  - unneeded_parentheses_in_closure_argument
  - vertical_whitespace_before_comment
  - yoda_condition

disabled_rules:
  - trailing_whitespace  # Handled by editor
  - todo              # TODOs allowed during active development; CI gate via PR review

# Thresholds
cyclomatic_complexity:
  warning: 8
  error: 10            # Constitution §I — cyclomatic complexity ≤ 10

function_body_length:
  warning: 40
  error: 60

file_length:
  warning: 400
  error: 600

line_length:
  warning: 120
  error: 150
  ignores_urls: true
  ignores_comments: true

type_body_length:
  warning: 200
  error: 300

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - x
    - y
    - dx
    - dy

# Custom rules
custom_rules:
  given_when_then_test_names:
    name: "Given/When/Then Test Naming"
    message: "Test functions in SonasTests/ MUST follow the pattern: given_<state>_when_<action>_then_<outcome> (Constitution §II)"
    regex: "func test(?!.*given_.*_when_.*_then_)[A-Za-z]"
    match_kinds:
      - identifier
    included: ".*Tests\\.swift"
    severity: error

  no_lint_suppressions_without_issue:
    name: "SwiftLint Suppression Requires Tracking Issue"
    message: "swiftlint:disable comment MUST include a tracking issue URL or ticket ID (Constitution §I)"
    regex: "swiftlint:disable(?!.*#|.*http|.*SONAS-)"
    match_kinds:
      - comment
    severity: warning
