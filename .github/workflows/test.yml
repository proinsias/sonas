---
name: Test
on:
  push:
    branches: [main]
  pull_request:
jobs:
  unit-contract:
    name: Unit & Contract Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate project.yml from template
        run: |
          sed \
            -e 's/YOUR_TEAM_ID//' \
            -e 's/com\.yourteam/com.ci/' \
            -e 's/YOUR_SPOTIFY_CLIENT_ID/placeholder/' \
            -e 's/YOUR_GOOGLE_CLIENT_ID/placeholder/' \
            project.yml.template > project.yml

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run unit and contract tests
        run: |
          xcodebuild test \
            -scheme SonasTests \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -configuration Debug \
            -enableCodeCoverage YES \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || exit 1

  ui:
    name: UI Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate project.yml from template
        run: |
          sed \
            -e 's/YOUR_TEAM_ID//' \
            -e 's/com\.yourteam/com.ci/' \
            -e 's/YOUR_SPOTIFY_CLIENT_ID/placeholder/' \
            -e 's/YOUR_GOOGLE_CLIENT_ID/placeholder/' \
            project.yml.template > project.yml

      - name: Patch mock flags into scheme environment
        run: |
          python3 - <<'PYEOF'
          import re, pathlib

          scheme = pathlib.Path('project.yml')
          text = scheme.read_text()
          # Flip all mock flags to 1 so the UI test runner uses fixture data
          text = re.sub(r"(USE_MOCK_\w+: )'0'", r"\g<1>'1'", text)
          scheme.write_text(text)
          PYEOF

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run UI tests
        run: |
          xcodebuild test \
            -scheme SonasUITests \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || exit 1
