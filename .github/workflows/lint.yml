---
name: Lint
on:
  push:
    branches: [main]
  pull_request:
jobs:
  prek:
    name: prek
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }} # [default: ${{ github.token }}] GitHub token for API authentication
      - uses: j178/prek-action@v2
