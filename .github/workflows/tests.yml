---
name: Tests
on:
  push:
    branches: [main]
  pull_request:
jobs:
  ui-ios:
    name: UI Tests (iOS Simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Select Xcode 16.3 (if available)
        run: |
          if [ -d /Applications/Xcode_16.3.app ]; then
            echo "DEVELOPER_DIR=/Applications/Xcode_16.3.app/Contents/Developer" >> "$GITHUB_ENV"
          fi

      - name: Install iOS 18.4 Simulator runtime
        run: xcodebuild -downloadPlatform iOS

      - name: Generate project.yml from template
        run: |
          sed \
            -e 's/YOUR_TEAM_ID//' \
            -e 's/com\.yourteam/com.ci/' \
            -e 's/YOUR_SPOTIFY_CLIENT_ID/placeholder/' \
            -e 's/YOUR_GOOGLE_CLIENT_ID/placeholder/' \
            project.yml.template > project.yml

      - name: Patch mock flags into scheme environment
        run: |
          python3 - <<'PYEOF'
          import re, pathlib

          scheme = pathlib.Path('project.yml')
          text = scheme.read_text()
          # Flip all mock flags to 1 so the UI test runner uses fixture data
          text = re.sub(r"(USE_MOCK_\w+: )'0'", r"\g<1>'1'", text)
          scheme.write_text(text)
          PYEOF

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run UI tests on iOS Simulator
        run: mise run tests-ui-ios

